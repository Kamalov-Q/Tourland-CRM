services:
  postgres:
    image: postgres:16-alpine
    container_name: tourland-postgres
    restart: always
    ports:
      - "1029:5432"
    environment:
      POSTGRES_USER: kamal
      POSTGRES_PASSWORD: kamalov-tourland-crm
      POSTGRES_DB: tourland
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tourland-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
